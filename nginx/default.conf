server {
    listen 80;
    server_name ahyun.site www.ahyun.site;

    # 모든 HTTP 요청을 HTTPS로 강제 리다이렉트
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ahyun.site www.ahyun.site;

    # SSL 인증서 경로 (컨테이너 내부 경로 기준)
    ssl_certificate /etc/letsencrypt/live/ahyun.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahyun.site/privkey.pem;

    # 보안 설정 최적화
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}