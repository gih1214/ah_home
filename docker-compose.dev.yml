services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://backend:4000
    depends_on:
      - backend

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_password_here}
      MYSQL_DATABASE: ${DB_NAME:-ah_home}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
